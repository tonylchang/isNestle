name: isNestle
options:
  bundleIdPrefix: net.1x0
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    CODE_SIGN_STYLE: Automatic
    # Signing (DEVELOPMENT_TEAM, PRODUCT_BUNDLE_IDENTIFIER) comes from the
    # gitignored app/Local.xcconfig — see app/Local.xcconfig.example.
targets:
  isNestle:
    type: application
    platform: iOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: isNestle
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        # Base plist supplies the top-level CFBundleIconName (App Store error 90713);
        # generated keys merge on top. See app/Info.plist.
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSCameraUsageDescription: "isNestle uses the camera only to scan product barcodes on your device. Nothing is recorded, stored, or sent anywhere."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        # Only standard HTTPS (OS-provided) — declare encryption exemption so
        # TestFlight/App Store skips the export-compliance prompt on every build.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    scheme:
      testTargets:
        - isNestleTests
  isNestleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: isNestleTests
    dependencies:
      - target: isNestle
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/isNestle.app/isNestle"
        BUNDLE_LOADER: "$(TEST_HOST)"
