name: Build & publish dataset

# Rebuilds the isNestle dataset daily and publishes it to a rolling
# `dataset-latest` GitHub Release (SQLite + manifest.json). The app checks the
# manifest and self-updates. See INFRA.md / VERSIONING.md.

on:
  schedule:
    - cron: "17 6 * * *"        # daily, 06:17 UTC
  workflow_dispatch:            # allow manual runs

permissions:
  contents: write               # create/update the release

concurrency:
  group: dataset
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Holds DATASET_SIGNING_KEY; deployment branch policy restricts it to main.
    environment: dataset-publish
    steps:
      # Actions are pinned by commit SHA (not floating tags) so a moved tag in a
      # compromised action repo can't inject code into the publish pipeline.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065   # v5.6.0
        with:
          python-version: "3.12"

      - name: Unit-test parsing functions
        working-directory: data-pipeline
        run: python3 test_parsing.py

      - name: Build dataset (brands -> barcodes -> sqlite)
        working-directory: data-pipeline
        run: |
          python3 build_brands.py
          python3 reconcile_brands.py --refresh-facets
          python3 build_barcodes.py
          python3 build_prefixes.py
          python3 build_db.py

      - name: Validate dataset
        working-directory: data-pipeline
        run: python3 test_spike.py

      - name: Build manifest
        working-directory: data-pipeline
        run: python3 build_manifest.py --version "$(date -u +%Y.%m.%d.%H%M)"

      - name: Verify release assets
        working-directory: data-pipeline
        run: python3 ../scripts/verify_release_assets.py --db out/isnestle.sqlite --manifest out/manifest.json

      - name: Guard against dataset shrink
        working-directory: data-pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A degraded source shrinks the output instead of failing; refuse to
          # publish if counts dropped >10% vs the currently published dataset.
          if gh release download dataset-latest --pattern manifest.json --output previous_manifest.json; then
            python3 check_counts.py --previous previous_manifest.json
          else
            echo "::warning::No previous manifest found (first publish?) — skipping shrink check."
          fi

      - name: Sign manifest
        working-directory: data-pipeline
        env:
          DATASET_SIGNING_KEY: ${{ secrets.DATASET_SIGNING_KEY }}
          # Raw hex Ed25519 public keys the app trusts (DatasetManifest.trustedPublicKeys).
          # Rotation = swap the environment secret to the standby key; no edit here.
          TRUSTED_PUBLIC_KEYS: >-
            cc8c8947d16d824d37f84579a587fdf720c1ac83336f503748c9963a1b39bff9
            9d8a106e60076bf8137f92eb80c0d11a4f6f17503e2a02eadbf08c101b344e21
        run: |
          umask 077
          printf '%s\n' "$DATASET_SIGNING_KEY" > signing-key.pem
          trap 'rm -f signing-key.pem signing-pub.pem' EXIT
          openssl pkey -in signing-key.pem -pubout -out signing-pub.pem
          ACTUAL="$(openssl pkey -pubin -in signing-pub.pem -pubout -outform DER | tail -c 32 | xxd -p -c 64)"
          case " $TRUSTED_PUBLIC_KEYS " in
            *" $ACTUAL "*) echo "Signing with trusted key $ACTUAL" ;;
            *) echo "::error::DATASET_SIGNING_KEY is not a key the shipped app trusts."; exit 1 ;;
          esac
          openssl pkeyutl -sign -inkey signing-key.pem -rawin \
            -in out/manifest.json -out out/manifest.json.sig
          # Self-verify before anything is published.
          openssl pkeyutl -verify -pubin -inkey signing-pub.pem -rawin \
            -in out/manifest.json -sigfile out/manifest.json.sig

      - name: Summarize
        working-directory: data-pipeline
        run: |
          echo "### Dataset built" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat out/manifest.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Alias review" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,80p' out/alias_review.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to rolling release
        working-directory: data-pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(date -u +%Y.%m.%d.%H%M)"
          # Ensure the rolling release exists (ignore "already exists").
          gh release create dataset-latest \
            --title "Dataset (latest)" \
            --notes "Rolling isNestle dataset. Current version: $VERSION. Derived data under ODbL (Open Food Facts); brand ownership CC0 (Wikidata)." \
            || true
          gh release upload dataset-latest \
            out/isnestle.sqlite out/manifest.json out/manifest.json.sig --clobber
